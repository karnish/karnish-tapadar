<style>
.topnav {
    background-color: #cfd8cc;
    padding: 10px 20px;
    border-radius: 15px;
    margin-top: 20px;
    margin-left: auto;
    width: fit-content;
}

.topnav ul {
    display: flex;
    gap: 20px;
    align-items: center;
}

.topnav ul li {
    list-style: none;
}

.topnav ul li a {
    text-decoration: none;
    font-size: 16px;
    color: #1a73e8;
    font-weight: 500;
}

/* ACTIVE MENU ITEM */
.topnav ul li a {
    transition: 0.3s;
}


.topnav ul li a:hover {
    color: green !important;
    
}

/* dropdown parent */
.topnav ul li {
    position: relative;
}

/* dropdown hidden */
.dropdown-menu {
    display: none;
    position: absolute;
    background: white;
    top: 30px;
    left: 0;
    padding: 8px 0;
    border-radius: 8px;
    min-width: 150px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

/* dropdown items */
.dropdown-menu li {
    display: block;
    padding: 5px 15px;
}

/* dropdown links */
.dropdown-menu li a {
    color: #333;
    font-size: 14px;
}

/* hover effect */
.dropdown-menu li a:hover {
    background: #f1f1f1;
}

/* show dropdown */
.dropdown:hover .dropdown-menu {
    display: block;
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function() {

    const links = document.querySelectorAll('.topnav ul li a');

    links.forEach(link => {
        link.addEventListener('click', function() {

            links.forEach(l => l.classList.remove('active'));
            this.classList.add('active');

        });
    });

});
</script>
